<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <title>Document</title>
</head>
<body>
   <!-- Carousel -->
<div id="demo" class="carousel slide" data-bs-ride="carousel">

  <!-- Indicators/dots -->
  <div class="carousel-indicators">
    <button type="button" data-bs-target="#demo" data-bs-slide-to="0" class="active"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="1"></button>
    <button type="button" data-bs-target="#demo" data-bs-slide-to="2"></button>
  </div>
  
  <!-- The slideshow/carousel -->
  <div class="carousel-inner">
    <div class="carousel-item active">
      <img src="./img/Aranygaluska_vaniliasodoval.jpg" alt="Aranygaluska vaniliasodóval" class="d-block" style="width:100%">
    </div>
    <div class="carousel-item">
      <img src="./img/Kaszinotojas.jpg" alt="Kaszinótojás" class="d-block" style="width:100%">
    </div>
    <div class="carousel-item">
      <img src="./img/rantotthus_petrezselymes_krumplival.jpg" alt="rántotthús petrezselymes krumplival" class="d-block" style="width:100%">
    </div>
    <div class="carousel-item">
      <img src="./img/Stefania_vagdalt.jpg" alt="Stefánia vagdalt" class="d-block" style="width:100% ">
    </div>
  </div>
  
  <!-- Left and right controls/icons -->
  <button class="carousel-control-prev" type="button" data-bs-target="#demo" data-bs-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </button>
  <button class="carousel-control-next" type="button" data-bs-target="#demo" data-bs-slide="next">
    <span class="carousel-control-next-icon"></span>
  </button>
</div>

<nav class="navbar navbar-expand-sm bg-dark navbar-dark">
  <div class="container-fluid">
    <ul class="navbar-nav">
      <li class="nav-item">
        <a class="nav-link active" href="#">Étlap</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Piák</a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="#">Nyitvatartás</a>
      </li>
      <li class="nav-item">
        <a class="nav-link disabled" href="#">Különleges ajánlatok</a>
      </li>
    </ul>
  </div>
</nav>
    
</body>
</html>
